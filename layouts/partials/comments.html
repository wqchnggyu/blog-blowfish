{{/* Waline 评论系统（v1 客户端，匹配 v1 服务端）
     自动跟随 Blowfish 深浅色模式切换 */}}
<link rel="stylesheet" href="https://unpkg.com/@waline/client@v1/dist/waline.css" />
<div id="waline"></div>

<script>
  (function () {
    function loadWaline() {
      var script = document.createElement('script');
      script.src = 'https://unpkg.com/@waline/client@v1/dist/Waline.min.js';
      script.onload = function () {
        new Waline({
          el: '#waline',
          serverURL: 'https://comment-waline.wqch.net/',
          lang: 'zh-CN',
          login: 'force',
          dark: 'html.dark',
          emoji: [
            'https://unpkg.com/@waline/emojis@1.2.0/weibo',
            'https://unpkg.com/@waline/emojis@1.2.0/bilibili',
          ],
          comment: true,
        });
      };
      document.head.appendChild(script);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadWaline);
    } else {
      loadWaline();
    }
  })();
</script>
