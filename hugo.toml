baseURL = 'https://wqchnggyu.github.io/blog-blowfish/'
languageCode = 'zh-cn'
defaultContentLanguage = "zh-cn"
title = "Wqchnggyu's blogs"
theme = "blowfish"

enableRobotsTXT = true
summaryLength = 0
buildDrafts = false
buildFuture = false
enableEmoji = true
# hugo.toml / config.toml
hasCJKLanguage = true

[pagination]
  pagerSize = 10

[imaging]
  anchor = 'Center'

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
