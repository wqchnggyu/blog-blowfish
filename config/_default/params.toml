# -- Theme Options --
# Refer to the theme docs for more details about each of these parameters.
# https://blowfish.page/docs/configuration/#theme-parameters

colorScheme = "blowfish"

# 自定义 CSS
customCSS = ["css/custom.css"]
defaultAppearance = "light" # valid options: light or dark
autoSwitchAppearance = true

enableSearch = true
enableCodeCopy = true

# 默认背景图（使用 assets/background.webp）
defaultBackgroundImage = "background.webp"

disableImageOptimization = false

[header]
  layout = "fixed" # valid options: basic, fixed, fixed-fill, fixed-gradient, fixed-fill-blur

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = true
  showScrollToTop = true
  [[footer.social]]
    name = "bilibili"
    url = "https://space.bilibili.com/527649125"
    icon = "bilibili"
    title = "哔哩哔哩"
  [[footer.social]]
    name = "github"
    url = "https://github.com/wqchnggyu"
    icon = "github"
    title = "GitHub"
  [[footer.social]]
    name = "gitlab"
    url = "https://gitlab.com/wqchnggyu"
    icon = "gitlab"
    title = "GitLab"

[homepage]
  layout = "background"         # 使用 background 样式
  showRecent = true
  showRecentItems = 5
  showMoreLink = false
  cardView = false
  layoutBackgroundBlur = false  # 背景不模糊，与参考博客一致

[article]
  showDate = true
  showViews = false
  showLikes = false
  showAuthor = true
  showHero = true
  heroStyle = "background"      # 文章页也使用 background 样式
  layoutBackgroundBlur = true
  layoutBackgroundHeaderSpace = true
  showBreadcrumbs = true
  showDraftLabel = true
  showHeadingAnchors = true
  showPagination = true
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true
  showWordCount = true
  showComments = true          # 开启 Waline 评论系统

[list]
  showHero = true
  heroStyle = "background"
  layoutBackgroundBlur = true
  layoutBackgroundHeaderSpace = false
  showBreadcrumbs = false
  showSummary = true
  showTableOfContents = false
  showCards = true
  groupByYear = true
  cardView = false

[sitemap]
  excludedKinds = ["taxonomy", "term"]

[taxonomy]
  showTermCount = true
  showHero = true
  heroStyle = "background"
  showBreadcrumbs = false
  showTableOfContents = false
  cardView = false

[term]
  showHero = true
  heroStyle = "background"
  showBreadcrumbs = false
  showTableOfContents = true
  groupByYear = false
  cardView = false
